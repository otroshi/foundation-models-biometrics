name: Auto-sync README to docs

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Split README into docs pages
        run: |
          python docs/split.py

      - name: Commit and push if changed
        run: |
          git config user.name "Hatef Otroshi"
          git config user.email "72525669+otroshi@users.noreply.github.com"
          git add docs/index.md
          git commit -m "[Sync] Auto-sync README to docs" || echo "No changes"
          git push